<ion-content [fullscreen]="true">

  <div class="page-wrapper" *ngIf="is_load">

      <div class="text">Сообщество</div>

      <div class="list">

    </div>

    <!-- сделать заказ-->
    <div class="make-request">
      <div class="text">Сделать заказ</div>
      <div class="flags">
        <div class="flag"><img src="../../../assets/flags/usa.png"></div>
        <div class="flag"><img src="../../../assets/flags/germany.png"></div>
        <div class="flag"><img src="../../../assets/flags/gb.png"></div>
        <div class="flag"><img src="../../../assets/flags/pl.png"></div>
      </div>
      <div class="flags">
        <div class="flag"><img src="../../../assets/flags/fr.png"></div>
        <div class="flag"><img src="../../../assets/flags/denmark.png"></div>
        <div class="flag"><img src="../../../assets/flags/es.png"></div>
        <div class="flag"><img src="../../../assets/flags/cn.png"></div>
      </div>

      <div class="button">
        <app-button title="Сделать заказ" (click)="openMakeOrderModal()"></app-button>
      </div>
    </div>


    <!-- последние заказы-->
    <div class="last_order" *ngIf="dashboardData.lastOrders.length>0">
      <div class="text">Последние заказы</div>
      <div class="text2">Посмотрите что заказывают другие клиенты, возможно, вам что-то надо</div>
    
    
    
      <swiper-container [spaceBetween]="15" [slidesPerView]="1.3" #swiper4>
        <swiper-slide *ngFor="let order of dashboardData.lastOrders">
          <div class="last_order_card">
    
            <div class="image" style='background-image: url("{{order.p_img}}")' ></div> 
            <div class="info">
              <div class="desc" [innerHtml]="order.last_stores.name"></div>
              <div class="title" [innerHtml]="order.last_title"></div>
              <div class="bottom-line">
                <div class="price"><span>Цена:</span>{{order.last_price}} ₽</div>
                <div class="button"  (click)="openMakeOrderModal()"><img src="../../../assets/basket1.png"></div>
              </div>
            </div>
          </div>
        </swiper-slide>
      </swiper-container>
    </div>

    <!-- Новости -->
    <div class="news_list">
      <div class="text">Новости

        <div class="button"  (click)="navigate(['/tabs/community'],{tab: 'news'})">
          Все
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 18 18">
            <path stroke="#FF7500" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6.75 3.75 11.25 9l-4.5 5.25"/>
          </svg>
        </div>

      </div>
      <div class="news_card" *ngFor="let news_item of dashboardData.news" (click)="openNewsItem(news_item)">

        <div class="image" style='background-image: url("{{news_item.image}}")'></div>
        <div class="info">
          <div class="line">
            <div class="desc" [innerHtml]="news_item.public_date"></div>
            <div class="title" [innerHtml]="news_item.category_name"></div>
          </div>
          <div class="desc" [innerHtml]="news_item.title"></div>
        </div>
      </div>


    </div>


    <!-- Отзывы -->
    <div class="reviews_list">
      <div class="text">Отзывы

        <div class="button"  (click)="navigate(['/tabs/community'],{tab: 'reviews'})">
          Все
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 18 18">
            <path stroke="#FF7500" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6.75 3.75 11.25 9l-4.5 5.25"/>
          </svg>
        </div>

      </div>
      <app-review-item [review]="review" *ngFor="let review of dashboardData.reviews"></app-review-item>


    </div>

    <!-- Акциии -->
    <div class="actions_list">
      <div class="text">Акции

        <div class="button"  (click)="navigate(['/tabs/community'],{tab: 'actions'})">
          Все
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 18 18">
            <path stroke="#FF7500" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6.75 3.75 11.25 9l-4.5 5.25"/>
          </svg>
        </div>

      </div>
      <app-action-item [order]="action" *ngFor="let action of dashboardData.actions"></app-action-item>


    </div>

    <!-- магаизины-->
    <div class="stores">
      <div class="text">
        Каталог магазинов
        <div class="button"   (click)="navigate(['/tabs/community'],{tab: 'catalog'})">
          Все
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 18 18">
            <path stroke="#FF7500" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6.75 3.75 11.25 9l-4.5 5.25"/>
          </svg>
        </div>
      </div>

      <div class="store-list">
          <app-store-card [store]="store" *ngFor="let store of dashboardData.stores"></app-store-card>
      </div>
    </div>



    <!-- условия -->
    <div class="usl" >
      <div class="text">Условия заказов</div>
      
      <div *ngFor="let item of dashboardData.usl_text">
        <div class="text2" *ngIf="item.type=='text'" [innerHtml]="this.sanitizer.bypassSecurityTrustHtml(item.content)"></div>
      
      
      
        <div class="accordion" *ngIf="item.type=='accordion'">
          <ion-accordion-group expand="inset" mode="ios">
            <ion-accordion *ngFor="let subitem of item.items">
              <ion-item slot="header" color="title-color" lines="none">
                <ion-label [innerHtml]="this.sanitizer.bypassSecurityTrustHtml(subitem.title)"></ion-label>
              </ion-item>
              <div class="ion-padding" slot="content" [innerHtml]="this.sanitizer.bypassSecurityTrustHtml(subitem.content)"
                (click)="openOferta($event)">
      
              </div>
            </ion-accordion>
          </ion-accordion-group>
        </div>
      </div>
    </div>

  </div>

</ion-content>
