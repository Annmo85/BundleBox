<ion-header class="ion-no-border">

        <div class="button-back  ion-activatable" *ngIf="has_back" (click)="back()">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
            <path stroke="#2D2D2D" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m15 5-6 7 6 7"/>
          </svg>
          
          <ion-ripple-effect></ion-ripple-effect>
        </div>

        <div class="button-back  ion-activatable" *ngIf="has_close" (click)="close()">

            <path stroke="#2D2D2D" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m15 5-6 7 6 7"/>
          </svg>
          
          <ion-ripple-effect></ion-ripple-effect>
        </div>
        <div class="button" *ngIf="!has_back && !has_close" style="padding-top: 9px;">
          <img src="../../../assets/header_logo.png">
            <ion-ripple-effect></ion-ripple-effect>
