      <div class="form">

        <ion-segment color="accent" value="{{current_segment}}" mode="ios" (ionChange)="changeForm($event)">
          <ion-segment-button value="phone">
            <ion-label>По телефону</ion-label>
          </ion-segment-button>
          <ion-segment-button value="email">
            <ion-label>По Email</ion-label>
          </ion-segment-button>
        </ion-segment>

        <form [formGroup]="ionicForm!" (ngSubmit)="submitForm()" novalidate  *ngIf="current_segment=='phone'">

          <div class="login input-field">
            <div class="label">Номер телефона <span class="required"></span></div>
            <div class="input" style="gap:5px" [ngClass]="{'error':ionicForm?.touched && ionicForm?.get('phone')?.invalid}">
              <div class="icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 18 18">
                  <path stroke="#2D2D2D" stroke-width="1.2" d="M3 7.5c0-2.828 0-4.243.879-5.121C4.757 1.5 6.172 1.5 9 1.5c2.828 0 4.243 0 5.121.879C15 3.257 15 4.672 15 7.5v3c0 2.828 0 4.243-.879 5.121-.878.879-2.293.879-5.121.879-2.828 0-4.243 0-5.121-.879C3 14.743 3 13.328 3 10.5v-3Z"/>
                  <path stroke="#2D2D2D" stroke-linecap="round" stroke-width="1.2" d="M11.25 14.25h-4.5m5.811-12.467-.063.095c-.567.85-.85 1.276-1.265 1.533a2.25 2.25 0 0 1-.256.137c-.444.202-.955.202-1.977.202-1.022 0-1.533 0-1.977-.202a2.25 2.25 0 0 1-.256-.137c-.415-.257-.698-.683-1.265-1.533l-.063-.095"/>
                </svg>
              </div>
              <div>+7</div>
              <ion-input [maskito]="phoneMask" [maskitoElement]="maskPredicate"  type="tel" inputmode="tel" #phone formControlName="phone" [autofocus]="true" (keyup.enter)="pwdSetFocus()"></ion-input>
            </div>
          </div>


          <div class="login input-field">
            <div class="label">Пароль</div>
            <div class="input"  [ngClass]="{'error':ionicForm?.touched && ionicForm?.get('password')?.invalid}">
              <div class="icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 18 18">
                  <path stroke="#2D2D2D" d="M1.5 12c0-2.121 0-3.182.659-3.841C2.818 7.5 3.879 7.5 6 7.5h6c2.121 0 3.182 0 3.841.659.659.659.659 1.72.659 3.841 0 2.121 0 3.182-.659 3.841-.659.659-1.72.659-3.841.659H6c-2.121 0-3.182 0-3.841-.659C1.5 15.182 1.5 14.121 1.5 12Z"/>
                  <path stroke="#2D2D2D" stroke-linecap="round" d="M4.5 7.5V6a4.5 4.5 0 0 1 9 0v1.5"/>
                  <path stroke="#2D2D2D" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 12h.007m2.986 0H9m2.993 0H12"/>
                </svg>
              </div>
              <ion-input type="password" inputmode="text" formControlName="password" #password (keyup.enter)="submitForm()" placeholder="Введите пароль"></ion-input>
            </div>
          </div>

          <div class="login input-field" style="flex-direction: row; justify-content: flex-start;">
            <ion-button fill="clear" shape="round" color="dark"  [routerLink]="['/restore']">Забыли пароль <ion-icon slot="end" name="chevron-forward-outline"></ion-icon></ion-button>
          </div>

          <div class="login input-field" >
            <ion-checkbox  [ngClass]="{'error':ionicForm?.touched && !ionicForm?.get('usl')?.value}" labelPlacement="end" mode="ios" color="accent" formControlName="usl">Авторизовываясь, я автоматически соглашаюсь с условиями</ion-checkbox>
          </div>


          <div class="login input-field">
            <app-button title="Авторизация" height="48" [disabled]="!ionicForm!.valid || !ionicForm?.get('usl')?.value" (action)="submitForm()"></app-button>

          </div>
          
          <div class="login input-field">
            <ion-button fill="clear" shape="round" color="dark" [routerLink]="['/registration']">Регистрация <ion-icon slot="end" name="chevron-forward-outline"></ion-icon></ion-button>
          </div>
          
        </form>

        <form [formGroup]="ionicForm1!" (ngSubmit)="submitForm1()" novalidate  *ngIf="current_segment=='email'">

          <div class="login input-field">
            <div class="label">Email <span class="required"></span></div>
            <div class="input" [ngClass]="{'error':ionicForm1?.touched && ionicForm1?.get('email')?.invalid}">
              <div class="icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 18 18">
                  <path stroke="#2D2D2D" stroke-width="1.2" d="M1.5 9c0-2.828 0-4.243.879-5.121C3.257 3 4.672 3 7.5 3h3c2.828 0 4.243 0 5.121.879.879.878.879 2.293.879 5.121 0 2.828 0 4.243-.879 5.121C14.743 15 13.328 15 10.5 15h-3c-2.828 0-4.243 0-5.121-.879C1.5 13.243 1.5 11.828 1.5 9Z"/>
                  <path stroke="#2D2D2D" stroke-linecap="round" stroke-width="1.2" d="m4.5 6 1.62 1.35C7.496 8.496 8.184 9.07 9 9.07s1.503-.574 2.88-1.722L13.5 6"/>
                </svg>
              </div>
              <ion-input type="text" inputmode="email" formControlName="email" #email  placeholder="Введите Email"></ion-input>
            </div>
          </div>


          <div class="login input-field">
            <div class="label">Пароль</div>
            <div class="input"  [ngClass]="{'error':ionicForm1?.touched && ionicForm1?.get('password')?.invalid}">
              <div class="icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 18 18">
                  <path stroke="#2D2D2D" d="M1.5 12c0-2.121 0-3.182.659-3.841C2.818 7.5 3.879 7.5 6 7.5h6c2.121 0 3.182 0 3.841.659.659.659.659 1.72.659 3.841 0 2.121 0 3.182-.659 3.841-.659.659-1.72.659-3.841.659H6c-2.121 0-3.182 0-3.841-.659C1.5 15.182 1.5 14.121 1.5 12Z"/>
                  <path stroke="#2D2D2D" stroke-linecap="round" d="M4.5 7.5V6a4.5 4.5 0 0 1 9 0v1.5"/>
                  <path stroke="#2D2D2D" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 12h.007m2.986 0H9m2.993 0H12"/>
                </svg>
              </div>
              <ion-input type="password" inputmode="text" formControlName="password" #password (keyup.enter)="submitForm1()" placeholder="Введите пароль"></ion-input>
            </div>
          </div>

          <div class="login input-field" style="flex-direction: row; justify-content: flex-start;">
            <ion-button fill="clear" shape="round" color="dark"  [routerLink]="['/restore']">Забыли пароль <ion-icon slot="end" name="chevron-forward-outline"></ion-icon></ion-button>
          </div>

          <div class="login input-field" >
            <ion-checkbox  [ngClass]="{'error':ionicForm1?.touched && !ionicForm1?.get('usl')?.value}" labelPlacement="end" mode="ios" color="accent" formControlName="usl">Авторизовываясь, я автоматически соглашаюсь с условиями</ion-checkbox>
          </div>


          <div class="login input-field">
            <app-button title="Авторизация" height="48" [disabled]="!ionicForm1!.valid || !ionicForm1?.get('usl')?.value" (action)="submitForm1()"></app-button>

          </div>
          
          <div class="login input-field">
            <ion-button fill="clear" shape="round" color="dark" [routerLink]="['/registration']">Регистрация <ion-icon slot="end" name="chevron-forward-outline"></ion-icon></ion-button>
          </div>
          
        </form>
      </div>

    </div>

    <div class="bottom_butotns">

      <div class="icon ion-activatable">
        <img src="../../assets/tg_icon.png">  
        
        <ion-ripple-effect type="bounded"></ion-ripple-effect>
      </div>



      <div class="icon ion-activatable">
        <img src="../../assets/wa_icon.png">        
        <ion-ripple-effect type="bounded"></ion-ripple-effect>
      </div>


      
    </div>


  </div>  
</ion-content>
